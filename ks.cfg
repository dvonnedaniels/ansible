#version=RHEL8
# Use graphical install
graphical

repo --name="AppStream" --baseurl=file:///run/install/sources/mount-0000-cdrom/AppStream

%packages
@^server-product-environment
aide
audit
fapolicyd
firewalld
opensc
openscap
openscap-scanner
openssh-server
openssl-pkcs11
policycoreutils
postfix
rng-tools
rsyslog
rsyslog-gnutls
scap-security-guide
tmux
usbguard
-abrt
-abrt-addon-ccpp
-abrt-addon-kerneloops
-abrt-cli
-abrt-plugin-sosreport
-iprutils
-krb5-server
-krb5-workstation
-libreport-plugin-logger
-libreport-plugin-rhtsupport
-python3-abrt-addon
-rsh-server
-sendmail
-telnet-server
-tftp-server
-tuned
-vsftpd
-xorg-x11-server-Xorg
-xorg-x11-server-Xwayland
-xorg-x11-server-common
-xorg-x11-server-utils

%end

# Keyboard layouts
keyboard --xlayouts='us'
# System language
lang en_US.UTF-8

# Network information
network  --bootproto=dhcp --device=enp0s3 --ipv6=auto --activate
network  --hostname=rocky8-client02

# Use CDROM installation media
cdrom

# Run the Setup Agent on first boot
firstboot --enable

ignoredisk --only-use=sda
# Partition clearing information
clearpart --none --initlabel
# Disk partitioning information
part /boot/efi --fstype="efi" --ondisk=sda --size=1024 --fsoptions="umask=0077,shortname=winnt"
part pv.469 --fstype="lvmpv" --ondisk=sda --size=74751
part /boot --fstype="xfs" --ondisk=sda --size=1024
volgroup rl --pesize=4096 pv.469
logvol /var --fstype="xfs" --size=10240 --name=var --vgname=rl
logvol / --fstype="xfs" --size=18423 --name=root --vgname=rl
logvol /tmp --fstype="xfs" --size=7168 --name=tmp --vgname=rl
logvol /home --fstype="xfs" --size=20480 --name=home --vgname=rl
logvol /var/log/audit --fstype="xfs" --size=2048 --name=var_log_audit --vgname=rl
logvol /var/log --fstype="xfs" --size=7168 --name=var_log --vgname=rl
logvol swap --fstype="swap" --size=2048 --name=swap --vgname=rl
logvol /var/tmp --fstype="xfs" --size=7168 --name=var_tmp --vgname=rl

# System timezone
timezone America/New_York --isUtc

# Root password
rootpw --iscrypted $6$N97PNEgCSstcUHNE$RoSL8geynrtzr/I/M9f5MSdHYocxpbq5jzTdsrzWtqRFrNF.AMNEm55S90kwGidjElv8gqtv61PlzN7tL2CE5.
user --groups=wheel --name=lemonte --password=$6$20ca93JaAcSj252m$JL5WNgK.BxUNVEWWwTwHIjsDtnN/s5qjYNQwlGaJkzRdw.cBSPR2qjM.PO9Pqm3AM4uZgtIO1PE6qU1kTmaTc1 --iscrypted --gecos="Dvonne Daniels"

%addon com_redhat_kdump --disable --reserve-mb='auto'

%end

